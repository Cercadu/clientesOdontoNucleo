<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>OdontoNúcleo · Mass WhatsApp</title>

    <meta property="og:title" content="OdontoNúcleo - Ortodontia">
    <meta property="og:description" content="Inicie seu tratamento este mês e ganhe uma limpeza de cortesia! 🦷">
    <meta property="og:url" content="https://cercadu.github.io/clientesOdontoNucleo/">
    <meta property="og:image" content="https://cercadu.github.io/clientesOdontoNucleo/img/anuncioOdontoNucleo.jpeg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1080">
    <meta property="og:image:height" content="1920">
    <meta property="og:type" content="website">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #075e54 0%, #128c7e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #075e54; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        .stats-bar {
            display: flex; justify-content: space-around;
            background: #f0fdf4; padding: 15px; border-radius: 20px; margin-bottom: 20px;
        }
        .stat { text-align: center; font-weight: bold; font-size: 0.9rem; }
        .stat span { display: block; color: #128c7e; font-size: 1.2rem; }
        
        textarea {
            width: 100%; min-height: 120px; padding: 15px;
            border-radius: 15px; border: 2px solid #ddd;
            font-family: monospace; margin-bottom: 15px;
        }
        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: transform 0.2s; margin-bottom: 10px;
        }
        .btn-import { background: #075e54; color: white; }
        .btn-send { 
            background: #25D366; color: white; font-size: 1.4rem; 
            box-shadow: 0 6px 0 #128c7e; margin-top: 10px;
        }
        .btn-send:active { transform: translateY(4px); box-shadow: 0 2px 0 #128c7e; }
        
        .progress-container { margin: 20px 0; display: none; }
        .progress-bar-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: #25D366; height: 100%; width: 0%; transition: width 0.3s; }
        
        .history { max-height: 150px; overflow-y: auto; font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 10px; }
        .history-item { padding: 5px 0; border-bottom: 1px solid #fafafa; display: flex; justify-content: space-between; }
        
        .footer-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-small { flex: 1; padding: 10px; font-size: 0.8rem; border-radius: 10px; border: 1px solid #ddd; background: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦷 OdontoNúcleo Manager</h1>

    <div class="stats-bar">
        <div class="stat">Total<span id="txtTotal">0</span></div>
        <div class="stat">Enviados<span id="txtEnviados">0</span></div>
        <div class="stat">Faltam<span id="txtPendentes">0</span></div>
    </div>

    <div id="setupArea">
        <textarea id="inputNumeros" placeholder="Cole os números aqui (um por linha)..."></textarea>
        <button class="btn btn-import" onclick="importar()">📥 Carregar Lista de Pacientes</button>
    </div>

    <div id="workArea" style="display:none;">
        <div class="progress-container" id="progresso">
            <p style="text-align:center; margin-bottom: 5px;">Enviando para: <strong id="currentNum">...</strong></p>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="bar"></div></div>
        </div>

        <button class="btn btn-send" id="btnProximo" onclick="enviarProximo()">🚀 ENVIAR PRÓXIMO</button>
        
        <div class="history" id="historico"></div>

        <div class="footer-btns">
            <button class="btn-small" onclick="gerarRelatorio()">📊 Relatório</button>
            <button class="btn-small" style="color:red;" onclick="resetar()">🗑️ Resetar</button>
        </div>
    </div>
</div>

<script>
    // Link do site no GitHub Pages (onde estão os metadados da imagem)
    const LINK_CAMPANHA = window.location.href; 

    const MENSAGENS = [
        `Olá! Tudo bem? 😊\n\nNeste mês de abril, estamos com uma condição especial na *OdontoNúcleo* para quem deseja iniciar seu tratamento ortodôntico 🦷\n\nAo iniciar o tratamento, você recebe uma *limpeza como cortesia*.\n\nConfira os detalhes no link abaixo:\n${LINK_CAMPANHA}`,
        
        `Olá! 😊 Seu sorriso merece cuidado ✨\n\nDurante o mês de abril, ao iniciar seu tratamento ortodôntico aqui na *OdontoNúcleo*, você ganha uma *limpeza como benefício especial*.\n\nAcesse para ver nossa localização e fotos:\n${LINK_CAMPANHA}`,
        
        `Olá! Tudo bem?\n\nEstamos com uma condição especial neste mês para tratamento ortodôntico 🦷\n\nIniciando seu tratamento, você recebe uma *limpeza como cortesia*.\n\nVeja nosso trabalho e agende sua avaliação:\n${LINK_CAMPANHA}`
    ];

    let pacientes = JSON.parse(localStorage.getItem('odonto_list') || '[]');
    let index = parseInt(localStorage.getItem('odonto_index') || '0');
    let historico = JSON.parse(localStorage.getItem('odonto_history') || '[]');

    function salvar() {
        localStorage.setItem('odonto_list', JSON.stringify(pacientes));
        localStorage.setItem('odonto_index', index);
        localStorage.setItem('odonto_history', JSON.stringify(historico));
        atualizarUI();
    }

    function formatar(num) {
        let n = num.replace(/\D/g, '');
        if (n.length === 11) n = '55' + n;
        if (n.length === 10) n = '55' + n.substring(0,2) + '9' + n.substring(2);
        return n.startsWith('55') ? n : '55' + n;
    }

    function importar() {
        const raw = document.getElementById('inputNumeros').value;
        const linhas = raw.split('\n').map(l => l.trim()).filter(l => l.length > 8);
        if(linhas.length === 0) return alert("Cole números válidos!");

        pacientes = linhas.map(l => formatar(l));
        index = 0;
        historico = [];
        salvar();
    }

    function enviarProximo() {
        if (index >= pacientes.length) return alert("Fim da lista!");

        const fone = pacientes[index];
        const msgBase = MENSAGENS[Math.floor(Math.random() * MENSAGENS.length)];
        
        // Abre o WhatsApp com a mensagem + Link que gera a prévia da imagem
        const url = `https://api.whatsapp.com/send?phone=${fone}&text=${encodeURIComponent(msgBase)}`;
        window.open(url, '_blank');

        historico.push({ fone, hora: new Date().toLocaleTimeString() });
        index++;
        salvar();
    }

    function atualizarUI() {
        document.getElementById('txtTotal').innerText = pacientes.length;
        document.getElementById('txtEnviados').innerText = index;
        document.getElementById('txtPendentes').innerText = pacientes.length - index;

        if(pacientes.length > 0) {
            document.getElementById('setupArea').style.display = 'none';
            document.getElementById('workArea').style.display = 'block';
            document.getElementById('progresso').style.display = 'block';
            document.getElementById('currentNum').innerText = pacientes[index] || "Concluído";
            
            const perc = (index / pacientes.length) * 100;
            document.getElementById('bar').style.width = perc + '%';
        }

        const histDiv = document.getElementById('historico');
        histDiv.innerHTML = historico.slice(-5).reverse().map(h => 
            `<div class="history-item"><span>✅ ${h.fone}</span><span>${h.hora}</span></div>`
        ).join('');
    }

    function gerarRelatorio() {
        let r = "*RELATÓRIO ODONTONÚCLEO*\n\n" + `Total: ${pacientes.length}\nEnviados: ${index}\n\n`;
        const url = `https://wa.me/?text=${encodeURIComponent(r)}`;
        window.open(url);
    }

    function resetar() {
        if(confirm("Apagar lista e começar do zero?")) {
            localStorage.clear();
            location.reload();
        }
    }

    atualizarUI();
</script>

</body>
</html>
