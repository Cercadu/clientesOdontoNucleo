<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OdontoNúcleo · Painel</title>

<!-- Open Graph (WhatsApp Preview) -->
<meta property="og:type" content="website">
<meta property="og:title" content="OdontoNúcleo - Ortodontia Especializada">
<meta property="og:description" content="🦷 Agende sua avaliação e limpeza esta semana!">
<meta property="og:url" content="https://cercadu.github.io/clientesOdontoNucleo/">
<meta property="og:image" content="https://cercadu.github.io/clientesOdontoNucleo/img/anuncioOdontoNucleo.jpeg">
<meta property="og:image:secure_url" content="https://cercadu.github.io/clientesOdontoNucleo/img/anuncioOdontoNucleo.jpeg">
<meta property="og:image:width" content="1080">
<meta property="og:image:height" content="1350">

<style>
body {
    font-family: Arial;
    background: linear-gradient(145deg,#075e54,#128c7e);
    padding: 15px;
}
.container {
    max-width: 420px;
    margin: auto;
    background: #fff;
    border-radius: 30px;
    padding: 20px;
}
h1 { text-align:center; color:#075e54; }

.stats {
    display:flex;
    justify-content:space-around;
    background:#e8f5e9;
    padding:10px;
    border-radius:20px;
    margin:15px 0;
}

.btn {
    width:100%;
    padding:20px;
    background:#25D366;
    color:#fff;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    margin-bottom:10px;
}

.progress {
    height:10px;
    background:#ddd;
    border-radius:5px;
    margin:15px 0;
}
.progress div {
    height:100%;
    background:#25D366;
    width:0%;
}

.history {
    max-height:120px;
    overflow:auto;
    font-size:12px;
    margin-bottom:15px;
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.button-group button {
    flex: 1;
    padding: 12px;
    background: #075e54;
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
}

.button-group button:last-child {
    background: #dc3545;
}

.button-group button:first-child {
    background: #17a2b8;
}

.export-btn {
    background: #28a745 !important;
}
</style>
</head>

<body>

<div class="container">
<h1>🦷 OdontoNúcleo</h1>

<div class="stats">
<div>Total<br><b id="total"></b></div>
<div>Enviados<br><b id="enviados"></b></div>
<div>Faltam<br><b id="faltam"></b></div>
</div>

<p>Próximo: <b id="proximo"></b></p>

<div class="progress"><div id="bar"></div></div>

<button class="btn" onclick="enviar()">🚀 ENVIAR</button>

<h3>Últimos envios</h3>
<div class="history" id="hist"></div>

<div class="button-group">
    <button onclick="exportarExcel()">📊 Exportar Excel</button>
    <button onclick="resetar()">🗑️ Resetar</button>
</div>

</div>

<script>

// ===== LISTA (SEU NÚMERO PRIMEIRO) =====
const LISTA = [
"34998964543",
"11934114885","11910500784","11939013946","11941046960","11958342166",
"11962731748","11963471216","11965769029","11966580846","11968458922",
"11972072515","11973512208","11983358314","11983678687","11988067109",
"11996441817","11997035613","11997635182","16996964316","17996009869",
"19981050215","19981156510","21967371160","24992807043","3187129395",
"3199056872","3199914682","3488418668","3488519198","3488545185",
"3491264650","3491278146","3491323630"
];

const MEU_NUM = "5534998964543";

// ===== MENSAGEM (LINK PRIMEIRO PRA IMAGEM FUNCIONAR) =====
const MSG = `🦷 Agende sua avaliação agora:

https://cercadu.github.io/clientesOdontoNucleo/?v=1

Olá! 😊

Está há um tempo sem cuidar do seu sorriso?

Temos horários disponíveis esta semana para avaliação e limpeza.

⚠️ Evite dores e tratamentos mais complexos no futuro.

📲 Fale conosco:
https://wa.me/5564984146201

📍 Como chegar:
https://share.google/uNCleJOVAxP72EQUh

🎥 Veja nosso trabalho:
https://www.instagram.com/reel/DVZnrJHCW5B/?igsh=MXQwZWNsd3h1cWd0eg==`;

// ===== CONTROLE =====
let i = Number(localStorage.getItem("idx")) || 0;
let hist = JSON.parse(localStorage.getItem("hist") || "[]");

function formatar(n){
    return n.startsWith("55") ? n : "55"+n;
}

function enviar(){
    if(i >= LISTA.length){
        alert("Lista finalizada!");
        return;
    }

    const numero = formatar(LISTA[i]);
    const url = `https://api.whatsapp.com/send?phone=${numero}&text=${encodeURIComponent(MSG)}`;

    window.open(url,"_blank");

    hist.push({
        numero: LISTA[i],
        data_hora: new Date().toLocaleString('pt-BR'),
        status: "Enviado"
    });
    i++;

    salvar();
    atualizar();
}

function atualizar(){
    document.getElementById("total").innerText = LISTA.length;
    document.getElementById("enviados").innerText = i;
    document.getElementById("faltam").innerText = LISTA.length - i;
    document.getElementById("proximo").innerText = LISTA[i] || "FIM";

    document.getElementById("bar").style.width = ((i/LISTA.length)*100)+"%";

    document.getElementById("hist").innerHTML =
        hist.slice(-5).reverse().map(x =>
            `<div>✅ ${x.numero} - ${x.data_hora}</div>`
        ).join("");
}

function salvar(){
    localStorage.setItem("idx", i);
    localStorage.setItem("hist", JSON.stringify(hist));
}

function exportarExcel() {
    // Criar dados para o Excel
    const dados = [];
    
    // Cabeçalho
    dados.push(['Número', 'Data/Hora do Envio', 'Status']);
    
    // Adicionar todos os envios realizados
    hist.forEach(item => {
        dados.push([item.numero, item.data_hora, item.status]);
    });
    
    // Adicionar os números que ainda não foram enviados
    const enviadosSet = new Set(hist.map(item => item.numero));
    const naoEnviados = LISTA.filter(num => !enviadosSet.has(num));
    
    if (naoEnviados.length > 0) {
        dados.push(['', '', '']); // Linha em branco
        dados.push(['=== NÃO ENVIADOS ===', '', '']);
        naoEnviados.forEach(num => {
            dados.push([num, 'Aguardando envio', 'Pendente']);
        });
    }
    
    // Adicionar resumo
    dados.push(['', '', '']);
    dados.push(['=== RESUMO ===', '', '']);
    dados.push(['Total de números', LISTA.length, '']);
    dados.push(['Total enviados', i, '']);
    dados.push(['Total pendentes', LISTA.length - i, '']);
    dados.push(['Progresso', ((i/LISTA.length)*100).toFixed(2) + '%', '']);
    
    // Converter para planilha
    const ws = XLSX.utils.aoa_to_sheet(dados);
    
    // Ajustar largura das colunas
    ws['!cols'] = [
        {wch:20},  // Coluna Número
        {wch:25},  // Coluna Data/Hora
        {wch:15}   // Coluna Status
    ];
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Relatorio_OdontoNucleo");
    
    // Gerar nome do arquivo com data atual
    const dataAtual = new Date().toISOString().slice(0,19).replace(/:/g, '-');
    const nomeArquivo = `relatorio_odontonucleo_${dataAtual}.xlsx`;
    
    // Exportar
    XLSX.writeFile(wb, nomeArquivo);
    
    // Opcional: Notificar via WhatsApp
    if(confirm("Relatório exportado com sucesso! Deseja enviar também via WhatsApp?")){
        const txt = `📊 Relatório OdontoNúcleo\n\nTotal: ${LISTA.length}\nEnviados: ${i}\nPendentes: ${LISTA.length - i}\nProgresso: ${((i/LISTA.length)*100).toFixed(1)}%\n\nArquivo Excel gerado: ${nomeArquivo}`;
        window.open(`https://api.whatsapp.com/send?phone=${MEU_NUM}&text=${encodeURIComponent(txt)}`);
    }
}

function resetar(){
    if(confirm("⚠️ ATENÇÃO: Isso vai resetar TODO o histórico e os envios!\nDeseja continuar?")){
        localStorage.clear();
        location.reload();
    }
}

// Inicializar
atualizar();

// Adicionar atalho de teclado para exportar (Ctrl+E)
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'e') {
        e.preventDefault();
        exportarExcel();
    }
});

</script>

<!-- Incluir biblioteca SheetJS para exportar Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

</body>
</html>
